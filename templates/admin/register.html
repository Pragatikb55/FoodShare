{% extends "base.html" %}

{% block title %}Admin Registration - FoodShare{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock display-4 text-warning"></i>
                    <h2 class="mt-3">Admin Registration</h2>
                    <p class="text-muted">Create a new admin account</p>
                </div>
                
                <form method="POST" action="{{ url_for('admin_register') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="full_name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Admin Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning btn-lg fw-bold">
                            <i class="bi bi-pencil"></i> Register as Admin
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <p class="text-center mb-0">
                    Already have an admin account? 
                    <a href="{{ url_for('admin_login') }}" class="text-warning fw-bold">Login here</a>
                </p>
                <p class="text-center mt-2">
                    <a href="{{ url_for('index') }}" class="text-muted">Back to Home</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
